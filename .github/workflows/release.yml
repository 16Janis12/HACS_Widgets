name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # HACS serves dist/evcc-cards.js from the release assets.
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/evcc-cards.js
          generate_release_notes: true
